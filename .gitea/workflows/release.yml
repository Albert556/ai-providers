name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      release_needed: ${{ steps.check.outputs.release_needed }}
      version: ${{ steps.check.outputs.version }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - name: Check version change
        id: check
        run: bash scripts/ci/check_release_needed.sh "${{ github.event.before }}" "${{ github.event.after }}"

  build:
    needs: check-version
    if: needs.check-version.outputs.release_needed == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            cross_deps: ""
          - target: aarch64-apple-darwin
            runner: macos
            cross_deps: ""
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-24.04
            cross_deps: "gcc-mingw-w64-x86-64"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Setup fnm
        if: runner.os == 'macOS'
        run: |
          eval "$(fnm env)"
          echo "$(dirname $(fnm exec --using=default which node))" >> "$GITHUB_PATH"

      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        if: runner.os != 'macOS'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup Rust PATH
        if: runner.os == 'macOS'
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compile dependencies
        if: matrix.cross_deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_deps }}

      - name: Configure Windows cross-linker
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        id: package
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          SRC="target/${TARGET}/release/aip"
          if [ "$TARGET" = "x86_64-pc-windows-gnu" ]; then
            SRC="${SRC}.exe"
          fi
          ARTIFACT_PATH="$(bash scripts/ci/package_binary.sh "$SRC" "$VERSION" "$TARGET")"
          echo "path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          echo "Built: $ARTIFACT_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: aip-${{ matrix.target }}
          path: ${{ steps.package.outputs.path }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -name 'aip-v*' -exec mv {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Check if tag exists
        id: tag-check
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists, skipping release"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.tag-check.outputs.tag_exists != 'true'
        uses: https://gitea.lan.wiqun.com/actions/gitea-release-action@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: "Release v${{ needs.check-version.outputs.version }}"
          prerelease: ${{ needs.check-version.outputs.is_prerelease }}
          files: |-
            release-files/**
