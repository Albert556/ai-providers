name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      release_needed: ${{ steps.check.outputs.release_needed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Check version change
        id: check
        run: |
          BEFORE="${{ github.event.before }}"
          # Extract current version
          NEW_VERSION=$(grep '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $NEW_VERSION"

          # Handle initial push (all-zeros SHA)
          if echo "$BEFORE" | grep -qE '^0+$'; then
            echo "Initial push detected, triggering release"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate before commit is reachable
          if ! git rev-parse --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
            echo "::error::Before commit $BEFORE is not reachable within fetch-depth=20"
            exit 1
          fi

          # Extract old version
          OLD_VERSION=$(git show "${BEFORE}":Cargo.toml | grep '^version' | sed 's/.*"\(.*\)".*/\1/')
          echo "Previous version: $OLD_VERSION"

          # Compare versions using full semver 2.0 rules (pre-release, build metadata)
          RESULT=$(python3 -c "
import re, sys

def parse_semver(v):
    m = re.match(r'^(\d+)\.(\d+)\.(\d+)(?:-([a-zA-Z0-9.]+))?(?:\+.*)?$', v)
    if not m:
        print(f'Invalid semver: {v}', file=sys.stderr)
        sys.exit(2)
    major, minor, patch = int(m[1]), int(m[2]), int(m[3])
    pre = m[4]  # None if no pre-release
    return (major, minor, patch, pre)

def compare_pre(a, b):
    # No pre-release > has pre-release (1.0.0 > 1.0.0-alpha)
    if a is None and b is None: return 0
    if a is None: return 1
    if b is None: return -1
    a_parts, b_parts = a.split('.'), b.split('.')
    for ap, bp in zip(a_parts, b_parts):
        a_num, b_num = ap.isdigit(), bp.isdigit()
        if a_num and b_num:
            diff = int(ap) - int(bp)
            if diff != 0: return diff
        elif a_num != b_num:
            return -1 if a_num else 1  # numeric < string
        else:
            if ap < bp: return -1
            if ap > bp: return 1
    return len(a_parts) - len(b_parts)  # more fields = higher

old_v, new_v = '$OLD_VERSION', '$NEW_VERSION'
o = parse_semver(old_v)
n = parse_semver(new_v)

# Compare major.minor.patch first, then pre-release
core = (n[0], n[1], n[2]) > (o[0], o[1], o[2])
if (n[0], n[1], n[2]) == (o[0], o[1], o[2]):
    result = compare_pre(n[3], o[3]) > 0
else:
    result = core
print('true' if result else 'false')
")

          if [ "$RESULT" = "true" ]; then
            echo "Version upgraded: $OLD_VERSION -> $NEW_VERSION"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version not upgraded (old=$OLD_VERSION, new=$NEW_VERSION)"
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: check-version
    if: needs.check-version.outputs.release_needed == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            cross_deps: ""
          - target: aarch64-apple-darwin
            runner: macos
            cross_deps: ""
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-24.04
            cross_deps: "gcc-mingw-w64-x86-64"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compile dependencies
        if: matrix.cross_deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_deps }}

      - name: Configure Windows cross-linker
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          SRC="target/${TARGET}/release/aip"
          if [ "$TARGET" = "x86_64-pc-windows-gnu" ]; then
            SRC="${SRC}.exe"
            DEST="aip-v${VERSION}-${TARGET}.exe"
          else
            DEST="aip-v${VERSION}-${TARGET}"
          fi
          cp "$SRC" "$DEST"
          echo "Built: $DEST"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: aip-${{ matrix.target }}
          path: aip-v*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -name 'aip-v*' -exec mv {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Check if tag exists
        id: tag-check
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists, skipping release"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.tag-check.outputs.tag_exists != 'true'
        uses: https://gitea.lan.wiqun.com/actions/gitea-release-action@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: "Release v${{ needs.check-version.outputs.version }}"
          files: |-
            release-files/**
