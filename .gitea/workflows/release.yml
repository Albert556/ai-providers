name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      release_needed: ${{ steps.check.outputs.release_needed }}
      version: ${{ steps.check.outputs.version }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check version change
        id: check
        run: |
          NEW_VERSION="$(awk '
            BEGIN { in_package = 0 }
            /^\[package\][[:space:]]*$/ { in_package = 1; next }
            /^\[/ { in_package = 0 }
            in_package && /^[[:space:]]*version[[:space:]]*=/ {
              line = $0
              sub(/^[^"]*"/, "", line)
              sub(/".*$/, "", line)
              print line
              exit
            }
          ' Cargo.toml)"
          echo "Current version: $NEW_VERSION"

          API_BASE="${GITEA_SERVER_URL:-}"
          if [ -z "$API_BASE" ]; then
            API_BASE="${GITHUB_SERVER_URL:-}"
          fi
          if [ -z "$API_BASE" ]; then
            echo "::error::Could not determine the Gitea server URL for tag lookup"
            exit 1
          fi

          LATEST_TAG="$(python3 .gitea/scripts/latest_semver_tag.py \
            --endpoint "${API_BASE%/}/api/v1/repos/${GITHUB_REPOSITORY}/git/refs/tags" \
            --auth-scheme token \
            --token "${{ github.token }}")"

          if [ -z "$LATEST_TAG" ]; then
            echo "No release tags found, treating this as the first release"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            LATEST_VERSION="${LATEST_TAG#v}"
            echo "Latest release tag: $LATEST_TAG"

            if [ "$LATEST_VERSION" = "$NEW_VERSION" ]; then
              echo "Version matches the latest release tag; skipping release"
              echo "release_needed=false" >> "$GITHUB_OUTPUT"
              echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            else
              RESULT="$(python3 .gitea/scripts/compare_versions.py "$LATEST_VERSION" "$NEW_VERSION")"
              if [ "$RESULT" = "true" ]; then
                echo "Version upgraded: $LATEST_VERSION -> $NEW_VERSION"
                echo "release_needed=true" >> "$GITHUB_OUTPUT"
                echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              else
                echo "::error::Cargo.toml version $NEW_VERSION is older than the latest release tag $LATEST_TAG"
                exit 1
              fi
            fi
          fi

          if echo "$NEW_VERSION" | grep -qE '[-+]'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.release_needed == 'true'
    env:
      RUSTUP_DIST_SERVER: https://rsproxy.cn
      RUSTUP_UPDATE_ROOT: https://rsproxy.cn/rustup
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            cross_deps: ""
          - target: aarch64-apple-darwin
            runner: macos
            cross_deps: ""
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-24.04
            cross_deps: "gcc-mingw-w64-x86-64"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Setup fnm
        if: runner.os == 'macOS'
        run: |
          eval "$(fnm env)"
          echo "$(dirname $(fnm exec --using=default which node))" >> "$GITHUB_PATH"

      - uses: actions/checkout@v6

      - name: Configure Cargo mirror
        run: |
          mkdir -p "$HOME/.cargo"
          cat > "$HOME/.cargo/config.toml" <<'EOF'
          [source.crates-io]
          replace-with = "rsproxy-sparse"

          [source.rsproxy-sparse]
          registry = "sparse+https://rsproxy.cn/index/"

          [registries.crates-io]
          protocol = "sparse"
          EOF

      - name: Install rustup and stable toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Fetch Cargo dependencies via mirror
        run: cargo fetch --locked --target ${{ matrix.target }}

      - name: Install cross-compile dependencies
        if: matrix.cross_deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_deps }}

      - name: Configure Windows cross-linker
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          SRC="target/${TARGET}/release/aip"
          if [ "$TARGET" = "x86_64-pc-windows-gnu" ]; then
            SRC="${SRC}.exe"
            DEST="aip-v${VERSION}-${TARGET}.exe"
          else
            DEST="aip-v${VERSION}-${TARGET}"
          fi
          cp "$SRC" "$DEST"
          echo "Built: $DEST"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: aip-${{ matrix.target }}
          path: aip-v*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -name 'aip-v*' -exec mv {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Check if tag exists
        id: tag-check
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists, skipping release"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.tag-check.outputs.tag_exists != 'true'
        uses: https://gitea.lan.wiqun.com/actions/gitea-release-action@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: "Release v${{ needs.check-version.outputs.version }}"
          prerelease: ${{ needs.check-version.outputs.is_prerelease }}
          files: |-
            release-files/**
