name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-slim
    outputs:
      release_needed: ${{ steps.check.outputs.release_needed }}
      version: ${{ steps.check.outputs.version }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Check version change
        id: check
        run: |
          NEW_VERSION="$(awk '
            BEGIN { in_package = 0 }
            /^\[package\][[:space:]]*$/ { in_package = 1; next }
            /^\[/ { in_package = 0 }
            in_package && /^[[:space:]]*version[[:space:]]*=/ {
              line = $0
              sub(/^[^"]*"/, "", line)
              sub(/".*$/, "", line)
              print line
              exit
            }
          ' Cargo.toml)"
          echo "Current version: $NEW_VERSION"

          LATEST_TAG="$(python3 .gitea/scripts/latest_semver_tag.py \
            --endpoint "${{ github.api_url }}/repos/${{ github.repository }}/git/matching-refs/tags" \
            --auth-scheme bearer \
            --token "${{ github.token }}")"

          if [ -z "$LATEST_TAG" ]; then
            echo "No release tags found, treating this as the first release"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            LATEST_VERSION="${LATEST_TAG#v}"
            echo "Latest release tag: $LATEST_TAG"

            if [ "$LATEST_VERSION" = "$NEW_VERSION" ]; then
              echo "Version matches the latest release tag; skipping release"
              echo "release_needed=false" >> "$GITHUB_OUTPUT"
              echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            else
              RESULT="$(python3 .gitea/scripts/compare_versions.py "$LATEST_VERSION" "$NEW_VERSION")"
              if [ "$RESULT" = "true" ]; then
                echo "Version upgraded: $LATEST_VERSION -> $NEW_VERSION"
                echo "release_needed=true" >> "$GITHUB_OUTPUT"
                echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              else
                echo "::error::Cargo.toml version $NEW_VERSION is older than the latest release tag $LATEST_TAG"
                exit 1
              fi
            fi
          fi

          if echo "$NEW_VERSION" | grep -qE '[-+]'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.release_needed == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-slim
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-gnu
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Install MinGW for GNU Windows target
        if: runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install rustup and stable toolchain (Unix)
        if: runner.os != 'Windows'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install rustup and stable GNU toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          .\rustup-init.exe -y --profile minimal --default-host x86_64-pc-windows-gnu --default-toolchain stable-x86_64-pc-windows-gnu
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add MinGW to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          "$env:MSYS2_LOCATION\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Fetch Cargo dependencies
        run: cargo fetch --locked --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          SRC="target/${TARGET}/release/aip"
          if [ "$TARGET" = "x86_64-pc-windows-gnu" ]; then
            SRC="${SRC}.exe"
            DEST="aip-v${VERSION}-${TARGET}.exe"
          else
            DEST="aip-v${VERSION}-${TARGET}"
          fi
          cp "$SRC" "$DEST"
          echo "Built: $DEST"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: aip-${{ matrix.target }}
          path: aip-v*

  release:
    needs: [check-version, build]
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -name 'aip-v*' -exec mv {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Check if tag exists
        id: tag-check
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists, skipping release"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.tag-check.outputs.tag_exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: Release v${{ needs.check-version.outputs.version }}
          prerelease: ${{ needs.check-version.outputs.is_prerelease == 'true' }}
          files: release-files/**
